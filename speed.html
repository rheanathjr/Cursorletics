<!doctype html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Speed Drill</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS -->
        <link rel="stylesheet" href="speed.css">
    </head>

    <body>
        <!-- Instructions -->
        <div class="modal fade" id="instructionModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">
                            Speed Drill
                        </h4>
                    </div>

                    <div class="modal-body">
                        <p>
                            Click anywhere on the screen as fast as you can.
                        </p>

                        <p>
                            You have 30 seconds.
                        </p>

                        <p>
                            Try to achieve the highest clicks per second!
                        </p>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-primary" id="startButton" data-bs-dismiss="modal">
                            Start Drill
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="modal fade" id="resultModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">
                            Results
                        </h4>
                    </div>

                    <div class="modal-body text-center">
                        <h2>Total Clicks</h2>

                        <h1 id="totalClicks">
                            0
                        </h1>

                        <hr>

                        <h2>Clicks Per Second</h2>

                        <h1 id="cps">
                            0
                        </h1>

                        <hr>

                        <h3 id="rank">
                            Nice!
                        </h3>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-primary" onclick="location.reload()">
                            Try Again
                        </button>

                        <a href="index.html" class="btn btn-secondary">
                            Home
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Screen -->
        <main id="gameScreen">
            <div class="text-center">
                <h1 id="timer">
                    30
                </h1>

                <h2 id="clickCounter">
                    Clicks: 0
                </h2>

                <h2 class="mt-3">
                    Click anywhere!
                </h2>
            </div>
        </main>

        <!-- Bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <script src="speed.js"></script>
    </body>
</html>
